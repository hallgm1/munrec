<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Receipt Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .controls-container {
            width: 90mm;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            border: none;
            color: white;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-preview { background-color: #3498db; width: 100%; }
        .row { display: flex; gap: 10px; }
        .btn-print { background-color: #27ae60; flex: 1; }
        .btn-archive { background-color: #e67e22; flex: 1; }
        .btn-reset { background-color: #95a5a6; width: 100%; }

        #receipt {
            background-color: white;
            width: 72mm;
            padding: 8mm;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 13px;
            line-height: 1.3;
            color: #000;
        }

        .center { text-align: center; }
        .bold { font-weight: bold; }
        .divider { border-top: 1px dashed #000; margin: 8px 0; }
        .double-divider { border-top: 3px double #000; margin: 8px 0; height: 0; }
        
        /* Barcode Area */
        .barcode-container {
            margin-top: 15px;
            text-align: center;
        }
        #barcode {
            width: 100%;
            max-height: 60px;
        }

        @media print {
            .controls-container { display: none !important; }
            body { background-color: white; padding: 0; }
            #receipt { box-shadow: none; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button class="btn btn-preview" onclick="updateBarcode()">Update Barcode</button>
        <div class="row">
            <button class="btn btn-print" onclick="window.print()">Print</button>
            <button class="btn btn-archive" onclick="alert('Archive saved')">Archive</button>
        </div>
        <button class="btn btn-reset" onclick="resetReceipt()">Reset to 1</button>
    </div>

    <div id="receipt">
        <div class="center">
            <div contenteditable="true">Halmashauri ya Jiji la Dar es Salaam</div>
            <div>Receipt No: <span id="receipt-no" contenteditable="true">1421102411123</span></div>
        </div>
        
        <div class="divider"></div>
        <div class="center bold" contenteditable="true">KAJENJERE TRADING CO.LTD</div>
        <div class="double-divider"></div>

        <div>ADA ZA TAKA :Tsh <span contenteditable="true">30000.00</span></div>
        <br>
        <div class="bold">JUMLA :Tsh <span contenteditable="true">30000.00</span></div>
        
        <div class="double-divider"></div>

        <div>JINA LA MLIPAJI :<span contenteditable="true">Mnazi. Traspot</span></div>
        <div contenteditable="true">taka mwezi Feb/2026/ kamata</div>
        <div class="double-divider"></div>

        <div id="current-date" contenteditable="true">TAREHE 04-03-2026 11:12:30</div>
        
        <div class="center bold" style="margin-top: 10px; font-size: 11px;">
            HII NI STAKABADHI HALALI YA FEDHA ILIYOLIPWA
        </div>

        <div class="barcode-container">
            <svg id="barcode"></svg>
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('en-GB');
            document.getElementById('current-date').innerText = `TAREHE ${dateStr} ${timeStr}`;
        }

        // Logic to generate the barcode based on the Receipt Number
        function updateBarcode() {
            const receiptNo = document.getElementById('receipt-no').innerText;
            JsBarcode("#barcode", receiptNo, {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 40,
                displayValue: false // Keeps it clean like your photo
            });
        }

        function resetReceipt() {
            document.getElementById('receipt-no').innerText = "1";
            updateBarcode();
        }

        window.onload = () => {
            updateDateTime();
            updateBarcode();
        };

        // Auto-update barcode while typing the receipt number
        document.getElementById('receipt-no').addEventListener('input', updateBarcode);
    </script>

</body>
</html>
